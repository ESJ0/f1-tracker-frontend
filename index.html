<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>F1 Tracker</title>
    <link rel="stylesheet" href="css/styles.css" />
</head>

<body>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-brand">
            <span class="brand-f1">F1</span><span class="brand-tracker">Tracker</span>
        </div>

        <div class="sidebar-meta">
            <span class="meta-label">RACING OPS</span>
            <span class="meta-version">V2.4.0-STABLE</span>
        </div>

        <nav class="sidebar-nav">
            <a href="#" class="nav-item active" data-page="dashboard">
                <span class="nav-icon">⊞</span>
                <span>Dashboard</span>
            </a>
            <a href="#" class="nav-item" data-page="races">
                <span class="nav-icon">◎</span>
                <span>Races</span>
            </a>
            <a href="#" class="nav-item" data-page="drivers">
                <span class="nav-icon">◯</span>
                <span>Drivers</span>
            </a>
            <a href="#" class="nav-item" data-page="results">
                <span class="nav-icon">⊟</span>
                <span>Results</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <a href="#" class="nav-item">
                <span class="nav-icon">?</span>
                <span>Support</span>
            </a>
            <a href="#" class="nav-item">
                <span class="nav-icon">◯</span>
                <span>Account</span>
            </a>
        </div>
    </aside>

    <!-- MAIN -->
    <main class="main">

        <!-- TOP BAR -->
        <header class="topbar">
            <nav class="topbar-nav" id="topbar-nav"></nav>
            <div class="topbar-actions">
                <div class="search-box">
                    <input type="text" id="global-search" placeholder="SEARCH TELEMETRY..." />
                </div>
                <button class="icon-btn">🔔</button>
                <button class="icon-btn">⚙</button>
            </div>
        </header>

        <!-- PAGES -->
        <div class="page active" id="page-dashboard"></div>
        <div class="page" id="page-races"></div>
        <div class="page" id="page-drivers"></div>
        <div class="page" id="page-results"></div>

    </main>

    <!-- MODAL -->
    <div class="modal-overlay hidden" id="modal-overlay">
        <div class="modal" id="modal">
            <div class="modal-header">
                <h2 class="modal-title" id="modal-title">Title</h2>
                <button class="modal-close" id="modal-close">✕</button>
            </div>
            <div class="modal-body" id="modal-body"></div>
        </div>
    </div>

    <!-- TOAST -->
    <div class="toast hidden" id="toast"></div>

    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
