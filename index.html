<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>F1 Tracker</title>
    <link rel="stylesheet" href="css/styles.css" />
</head>

<body>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-brand">
            <span class="brand-f1">F1</span><span class="brand-tracker">Tracker</span>
        </div>

        <div class="sidebar-meta">
            <span class="meta-label">RACING OPS</span>
            <span class="meta-version">V2.4.0-STABLE</span>
        </div>

        <nav class="sidebar-nav">
            <a href="#" class="nav-item active" data-page="dashboard">
                <span class="nav-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="7" height="7" rx="1"/>
                        <rect x="14" y="3" width="7" height="7" rx="1"/>
                        <rect x="3" y="14" width="7" height="7" rx="1"/>
                        <rect x="14" y="14" width="7" height="7" rx="1"/>
                    </svg>
                </span>
                <span>Dashboard</span>
            </a>

            <a href="#" class="nav-item" data-page="races">
                <span class="nav-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 12 Q6 4 12 4 Q18 4 21 12 Q18 20 12 20 Q6 20 3 12Z"/>
                        <path d="M12 4 L12 20"/>
                        <path d="M3 12 L21 12"/>
                        <circle cx="12" cy="12" r="2" fill="currentColor" stroke="none"/>
                    </svg>
                </span>
                <span>Races</span>
            </a>

            <a href="#" class="nav-item" data-page="drivers">
                <span class="nav-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="7" r="4"/>
                        <path d="M4 21 C4 17 7.6 14 12 14 C16.4 14 20 17 20 21"/>
                        <path d="M9 21 L9 17 M15 21 L15 17"/>
                    </svg>
                </span>
                <span>Drivers</span>
            </a>

            <a href="#" class="nav-item" data-page="results">
                <span class="nav-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 4 L4 20 L20 20"/>
                        <path d="M7 14 L10 10 L13 13 L17 7"/>
                        <circle cx="17" cy="7" r="1.5" fill="currentColor" stroke="none"/>
                    </svg>
                </span>
                <span>Results</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <a href="#" class="nav-item">
                <span class="nav-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="9"/>
                        <path d="M12 8 L12 8.5"/>
                        <path d="M12 11 L12 16"/>
                    </svg>
                </span>
                <span>Support</span>
            </a>
            <a href="#" class="nav-item">
                <span class="nav-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="8" r="4"/>
                        <path d="M4 20 C4 16 7.6 13 12 13 C16.4 13 20 16 20 20"/>
                    </svg>
                </span>
                <span>Account</span>
            </a>
        </div>
    </aside>

    <!-- MAIN -->
    <main class="main">

        <!-- TOP BAR -->
        <header class="topbar">
            <nav class="topbar-nav" id="topbar-nav"></nav>
            <div class="topbar-actions">
                <div class="search-box">
                    <input type="text" id="global-search" placeholder="SEARCH TELEMETRY..." />
                </div>
                <button class="icon-btn">🔔</button>
                <button class="icon-btn">⚙</button>
            </div>
        </header>

        <!-- PAGES -->
        <div class="page active" id="page-dashboard"></div>
        <div class="page" id="page-races"></div>
        <div class="page" id="page-drivers"></div>
        <div class="page" id="page-results"></div>

    </main>

    <!-- MODAL -->
    <div class="modal-overlay hidden" id="modal-overlay">
        <div class="modal" id="modal">
            <div class="modal-header">
                <h2 class="modal-title" id="modal-title">Title</h2>
                <button class="modal-close" id="modal-close">✕</button>
            </div>
            <div class="modal-body" id="modal-body"></div>
        </div>
    </div>

    <!-- TOAST -->
    <div class="toast hidden" id="toast"></div>

    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
